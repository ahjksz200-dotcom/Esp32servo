name: Build STM32 BlackPill Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackpill_firmware
          path: .pio/build/blackpill_f401rc/firmware.bin
